<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile — SkillSwap Hub</title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  <style>
    body {
      background-image: url("{{ url_for('static', filename='back_ground.png') }}");
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo">SkillSwap Hub</div>

    <nav>
      <a href="/" class="pill">Home</a>
      <a href="/resources" class="pill">Resources</a>
      <a href="/ai" class="pill">AI Tools</a>
      <a href="/contact" class="pill">Contact</a>
      <a href="/logout" class="pill">Logout</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main style="max-width:520px;margin:60px auto;padding:20px">

    <div class="card">

      <h2>Your Profile</h2>

      <form method="POST" action="/profile">

        <label>
          Full Name<br>
          <input type="text" name="name" value="{{ user.name or '' }}" required>
        </label>

        <label style="margin-top:12px">
          Email<br>
          <input type="email" value="{{ user.email }}" disabled>
        </label>

        <label style="margin-top:12px">
          Bio<br>
          <textarea name="bio" placeholder="Tell us about yourself...">{{ user.bio or '' }}</textarea>
        </label>

        <button class="btn" type="submit" style="margin-top:15px;">
          Save Profile
        </button>

      </form>

      {% if message %}
        <div class="muted" style="margin-top:10px;">
          {{ message }}
        </div>
      {% endif %}

    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    SkillSwap Hub — COM4113 Full-Stack Project
  </footer>

</body>

</html>
