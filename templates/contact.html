<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — SkillSwap Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<style>
    body {
        background-image: url('back_ground.png');
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-size: cover;
    }
</style>

<body>

    <!-- LOGIN PROTECTION -->
    <script>
        if (!localStorage.getItem('skillhub_currentUser')) {
            window.location.href = "login.html";
        }
    </script>

    <header>
        <div class="logo">SkillSwap Hub</div>

        <nav>
            <a href="index.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="resource.html" class="nav-link">Resources</a>
            <a href="ai.html" class="nav-link">AI Tools</a>
            <a href="login.html" class="nav-link">Logout</a>
        </nav>
    </header>

    <main style="max-width:900px;margin:auto;padding:20px">
        <div class="card">
            <h2>Contact Us</h2>
            <p class="muted">Have a question? Send us a message below.</p>

            <form id="contactForm" style="margin-top:15px">
                <label>Full Name *<br>
                    <input type="text" id="contactName" required>
                </label>

                <label style="margin-top:10px">Email *<br>
                    <input type="email" id="contactEmail" required>
                </label>

                <label style="margin-top:10px">Message *<br>
                    <textarea id="contactMessage" required></textarea>
                </label>

                <button class="btn" type="submit" style="margin-top:12px">Send</button>
                <div id="contactFeedback" class="muted" style="margin-top:10px"></div>
            </form>
        </div>
    </main>

    <footer>
        COM4113 — SkillSwap Hub Project
    </footer>

    <script src="script.js"></script>

</body>

</html>
