<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — SkillSwap Hub</title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  <style>
    body {
      background-image: url("{{ url_for('static', filename='back_ground.png') }}");
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
    }

    .toggle {
      margin-top: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      color: #0077cc;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <main style="max-width:420px;margin:60px auto;padding:20px">
    <div class="card">

      <h2 id="formTitle">Login to SkillSwap Hub</h2>

      <!-- LOGIN FORM -->
      <form id="loginForm" method="POST" action="/login">
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" required>

        <button class="btn" type="submit">Login</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" method="POST" action="/register" style="display:none;">
        <input name="email" type="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" required>

        <button class="btn" type="submit">Sign Up</button>
      </form>

      <!-- TOGGLE -->
      <div id="toggleMode" class="toggle">
        Don’t have an account? Sign up
      </div>

      <!-- FEEDBACK -->
      {% if error %}
        <div class="muted" style="margin-top:10px;color:red;">
          {{ error }}
        </div>
      {% endif %}

    </div>
  </main>

  <!-- SCRIPT -->
  <script>
    const toggle = document.getElementById('toggleMode');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const title = document.getElementById('formTitle');

    let isSignup = false;

    toggle.addEventListener('click', () => {
      isSignup = !isSignup;

      if (isSignup) {
        loginForm.style.display = "none";
        registerForm.style.display = "block";
        title.textContent = "Sign Up to SkillSwap Hub";
        toggle.textContent = "Already have an account? Login";
      } else {
        loginForm.style.display = "block";
        registerForm.style.display = "none";
        title.textContent = "Login to SkillSwap Hub";
        toggle.textContent = "Don’t have an account? Sign up";
      }
    });
  </script>

</body>

</html>
