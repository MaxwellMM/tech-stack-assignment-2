<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resources — SkillSwap Hub</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  <style>
    body {
      background-image: url("{{ url_for('static', filename='back_ground.png') }}");
      background-size: cover;
      background-attachment: fixed;
    }

    .fade-in {
      animation: fadeIn 0.4s ease-in;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>
  <div class="logo">SkillSwap Hub</div>
  <nav>
    <a href="/" class="pill">Home</a>
    <a href="/resources" class="pill">Resources</a>
    <a href="/profile" class="pill">Profile</a>
    <a href="/logout" class="pill">Logout</a>
  </nav>
</header>

<main style="max-width:1100px;margin:auto;padding:20px">

  <div class="card">
    <h2>Community Resources</h2>
    <p class="muted">Discover and share valuable skills and knowledge.</p>

    <!-- SEARCH -->
    <div class="search-row">
      <input id="searchInput" placeholder="Search resources...">
      <button id="searchBtn" class="btn">Search</button>
      <button onclick="loadPosts()" class="btn alt">Clear</button>
    </div>

    <!-- FILTERS -->
    <div style="margin-top:12px;display:flex;gap:10px;align-items:center">
      <select id="categoryFilter">
        <option value="all">All Categories</option>
      </select>

      <select id="sortSelect">
        <option value="new">Newest</option>
        <option value="top">Top</option>
      </select>
    </div>

    <!-- POST FORM -->
    <div class="card" style="margin-top:20px">
      <h3>Share a Resource</h3>
      <form id="postForm">
        <input id="postTitle" placeholder="Title" required>
        <input id="postDesc" placeholder="Description" required>
        <input id="postCategory" placeholder="Category">
        <button class="btn">Post</button>
      </form>
    </div>

    <!-- RESULTS -->
    <div id="results" class="tools-list" style="margin-top:20px"></div>

  </div>

</main>

<footer>SkillSwap Hub — COM4113 Project</footer>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
